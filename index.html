    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 14px;
            color: #333;
            background: #fff;
            overflow-x: hidden;
        }

        /* Header / Toolbar */
        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            border-bottom: 1px solid #e0e0e0;
            background: #fff;
            height: 48px;
        }

        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .toolbar-center {
            display: flex;
            align-items: center;
            gap: 8px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            cursor: pointer;
        }

        .toolbar-center .folder-icon {
            width: 22px;
            height: 22px;
        }

        .toolbar-center .title {
            font-size: 16px;
            font-weight: 400;
            color: #333;
        }

        .toolbar-center .dropdown-arrow {
            font-size: 10px;
            color: #666;
            margin-left: 4px;
        }

        .toolbar-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .toolbar-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #666;
            font-size: 18px;
            padding: 4px;
            display: flex;
            align-items: center;
            position: relative;
        }

        .toolbar-btn:hover {
            color: #333;
        }

        .toolbar-btn .badge {
            position: absolute;
            top: -2px;
            right: -6px;
            background: none;
            color: #666;
            font-size: 11px;
            font-weight: normal;
        }

        /* Column Header */
        .column-header {
            display: grid;
            grid-template-columns: 40px 60px 1fr 80px 180px 40px 40px;
            align-items: center;
            padding: 8px 16px;
            background: #f5f5f5;
            border-bottom: 1px solid #e0e0e0;
            font-size: 13px;
            color: #666;
            font-weight: 500;
        }

        .column-header .col-name {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .column-header .col-name .sort-icon {
            font-size: 11px;
        }

        .column-header .col-name .search-icon {
            font-size: 13px;
            cursor: pointer;
            color: #999;
        }

        /* File/Folder Rows */
        .file-list {
            list-style: none;
        }

        .file-row {
            display: grid;
            grid-template-columns: 40px 60px 1fr 80px 180px 40px 40px;
            align-items: center;
            padding: 10px 16px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background 0.1s;
        }

        .file-row:hover {
            background: #f8f8f8;
        }

        .file-row .checkbox {
            width: 16px;
            height: 16px;
            border: 1.5px solid #ccc;
            border-radius: 2px;
            cursor: pointer;
        }

        .file-row .type-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .file-row .file-name {
            color: #333;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-right: 10px;
        }

        .file-row .file-name:hover {
            text-decoration: underline;
            color: #0070d2;
        }

        .file-row .size {
            text-align: right;
            color: #666;
            font-size: 13px;
        }

        .file-row .modified {
            color: #666;
            font-size: 13px;
        }

        .file-row .comment-icon {
            color: #999;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .file-row .comment-icon:hover {
            color: #333;
        }

        .file-row .favorite-icon {
            color: #ccc;
            font-size: 16px;
            cursor: pointer;
        }

        .file-row .favorite-icon:hover {
            color: #f5a623;
        }

        /* Footer */
        .footer {
            padding: 8px 16px;
            background: #f5f5f5;
            border-top: 1px solid #e0e0e0;
            font-size: 13px;
            color: #666;
        }

        /* Folder Icons */
        .icon-folder {
            width: 32px;
            height: 26px;
            position: relative;
        }

        .icon-folder-orange svg {
            fill: #e8a027;
        }

        .icon-folder-purple svg {
            fill: #7b5ea7;
        }

        /* File type icons */
        .icon-pdf {
            color: #d32f2f;
        }

        .icon-email {
            color: #7b5ea7;
        }

        .icon-excel {
            color: #217346;
        }

        /* Comments Panel */
        .comments-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
        }

        .comments-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 420px;
            max-height: 400px;
            background: #fff;
            border: 2px solid #333;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
        }

        .comments-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px 12px;
        }

        .comments-header h3 {
            font-size: 20px;
            font-weight: 400;
            color: #333;
        }

        .comments-close {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: #333;
            padding: 4px;
        }

        .comments-input-area {
            display: flex;
            align-items: center;
            padding: 8px 20px;
            gap: 10px;
        }

        .comments-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #e0e0e0;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .comments-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .comments-input-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            border: 2px solid #e67e22;
            border-radius: 3px;
            padding: 6px 10px;
            gap: 6px;
        }

        .comments-input-wrapper input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 14px;
        }

        .comments-input-wrapper .input-icons {
            display: flex;
            gap: 6px;
            color: #999;
            font-size: 16px;
        }

        .comments-post-btn {
            background: #ccc;
            border: none;
            padding: 8px 16px;
            border-radius: 3px;
            color: #fff;
            font-size: 13px;
            cursor: pointer;
        }

        .comments-body {
            padding: 16px 20px;
            flex: 1;
            overflow-y: auto;
        }

        .comment-item {
            display: flex;
            gap: 10px;
        }

        .comment-item .comment-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #8d6e63;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 12px;
            font-weight: 600;
        }

        .comment-content {
            flex: 1;
        }

        .comment-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .comment-author {
            font-weight: 600;
            font-size: 13px;
            color: #333;
        }

        .comment-time {
            font-size: 12px;
            color: #999;
        }

        .comment-actions-icons {
            margin-left: auto;
            display: flex;
            gap: 8px;
            color: #666;
            font-size: 14px;
        }

        .comment-text {
            font-size: 14px;
            color: #333;
            margin-bottom: 6px;
        }

        .comment-links {
            font-size: 12px;
            color: #666;
        }

        .comment-links a {
            color: #666;
            text-decoration: none;
        }

        .comment-links a:hover {
            text-decoration: underline;
        }

        /* SVG Icons inline */
        .svg-icon {
            display: inline-flex;
            align-items: center;
        }

        /* Breadcrumb back button */
        .back-btn {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            color: #666;
            padding: 4px;
        }

        .back-btn:hover {
            color: #333;
        }

        .back-btn.visible {
            display: flex;
        }
    </style>
</head>

                return `<svg width="32" height="32" viewBox="0 0 32 32"><rect x="4" y="2" width="24" height="28" rx="2" fill="#fff" stroke="#217346" stroke-width="1.5"/><rect x="4" y="2" width="10" height="28" fill="#217346" rx="2"/><text x="9" y="18" text-anchor="middle" fill="#fff" font-size="8" font-weight="bold">X</text><line x1="17" y1="8" x2="26" y2="8" stroke="#217346" stroke-width="1"/><line x1="17" y1="13" x2="26" y2="13" stroke="#217346" stroke-width="1"/><line x1="17" y1="18" x2="26" y2="18" stroke="#217346" stroke-width="1"/><line x1="17" y1="23" x2="26" y2="23" stroke="#217346" stroke-width="1"/></svg>`;
            case "word":
                return `<svg width="32" height="32" viewBox="0 0 32 32"><rect x="4" y="2" width="24" height="28" rx="2" fill="#fff" stroke="#2b579a" stroke-width="1.5"/><rect x="4" y="2" width="10" height="28" fill="#2b579a" rx="2"/><text x="9" y="18" text-anchor="middle" fill="#fff" font-size="8" font-weight="bold">W</text><line x1="17" y1="8" x2="26" y2="8" stroke="#2b579a" stroke-width="1"/><line x1="17" y1="13" x2="26" y2="13" stroke="#2b579a" stroke-width="1"/><line x1="17" y1="18" x2="26" y2="18" stroke="#2b579a" stroke-width="1"/><line x1="17" y1="23" x2="26" y2="23" stroke="#2b579a" stroke-width="1"/></svg>`;
            case "pptx":
                return `<svg width="32" height="32" viewBox="0 0 32 32"><rect x="4" y="2" width="24" height="28" rx="2" fill="#fff" stroke="#d24726" stroke-width="1.5"/><rect x="4" y="2" width="10" height="28" fill="#d24726" rx="2"/><text x="9" y="18" text-anchor="middle" fill="#fff" font-size="8" font-weight="bold">P</text><line x1="17" y1="8" x2="26" y2="8" stroke="#d24726" stroke-width="1"/><line x1="17" y1="13" x2="26" y2="13" stroke="#d24726" stroke-width="1"/><line x1="17" y1="18" x2="26" y2="18" stroke="#d24726" stroke-width="1"/></svg>`;
            default:
                return `<svg width="32" height="32" viewBox="0 0 32 32"><rect x="4" y="2" width="24" height="28" rx="2" fill="#fff" stroke="#999" stroke-width="1.5"/></svg>`;
        }
    }

    function isFolder(type) {
        return type === "folder-orange" || type === "folder-purple";
    }

    function renderView(viewId) {
        const data = workspaceData[viewId];
        if (!data) return;

        currentView = viewId;
        document.getElementById("pageTitle").textContent = data.title;
        document.getElementById("mainCommentBadge").textContent = viewId === "root" ? "1" : "";

        // Show/hide back button
        const backBtn = document.getElementById("backBtn");
        if (viewId === "root") {
            backBtn.classList.remove("visible");
        } else {
            backBtn.classList.add("visible");
        }

        // Render file list
        const fileList = document.getElementById("fileList");
        fileList.innerHTML = "";

        data.items.forEach((item, index) => {
            const row = document.createElement("li");
            row.className = "file-row";
            
            const commentHtml = item.comments > 0 
                ? `<div class="comment-icon" onclick="event.stopPropagation(); openComments('${viewId}')">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
                    ${item.comments}
                   </div>`
                : `<div class="comment-icon"></div>`;

            row.innerHTML = `
                <div><input type="checkbox" class="checkbox" onclick="event.stopPropagation()"></div>
                <div class="type-icon">${getTypeIcon(item.type)}</div>
                <div class="file-name">${item.name}</div>
                <div class="size">${item.size}</div>
                <div class="modified">${item.modified}</div>
                ${commentHtml}
                <div class="favorite-icon" onclick="event.stopPropagation(); toggleFavorite(this)">&#9734;</div>
            `;

            if (isFolder(item.type) && item.folderId) {
                row.addEventListener("click", () => {
                    navigateTo(item.folderId);
                });
                row.style.cursor = "pointer";
            } else {
                row.addEventListener("click", () => {
                    // Simulate file click - highlight row
                    row.style.background = "#e8f4fd";
                    setTimeout(() => { row.style.background = ""; }, 800);
                });
            }

            fileList.appendChild(row);
        });

        // Show footer for subfolders
        const footer = document.getElementById("footer");
        if (viewId !== "root") {
            footer.style.display = "block";
            footer.textContent = data.items.length + " Items";
        } else {
            footer.style.display = "none";
        }
    }

    function navigateTo(folderId) {
        navigationStack.push(currentView);
        if (workspaceData[folderId]) {
            renderView(folderId);
        } else {
            // Generic empty folder
            const data = workspaceData.root.items.find(i => i.folderId === folderId);
            if (data) {
                document.getElementById("pageTitle").textContent = data.name;
                document.getElementById("fileList").innerHTML = `<li style="padding: 40px; text-align: center; color: #999;">No items to display</li>`;
                document.getElementById("backBtn").classList.add("visible");
                document.getElementById("footer").style.display = "block";
                document.getElementById("footer").textContent = "0 Items";
                currentView = folderId;
            }
        }
    }

    function navigateBack() {
        if (navigationStack.length > 0) {
            const prevView = navigationStack.pop();
            renderView(prevView);
        }
    }

    function toggleFavorite(el) {
        if (el.innerHTML === "★") {
            el.innerHTML = "&#9734;";
            el.style.color = "#ccc";
        } else {
            el.innerHTML = "★";
            el.style.color = "#f5a623";
        }
    }

    function openComments(context) {
        const overlay = document.getElementById("commentsOverlay");
        const body = document.getElementById("commentsBody");
        overlay.style.display = "block";

        // Load comments
        const comments = commentsData[context] || commentsData["main"] || [];
        body.innerHTML = "";

        comments.forEach(c => {
            const div = document.createElement("div");
            div.className = "comment-item";
            div.innerHTML = `
                <div class="comment-avatar">${c.initials}</div>
                <div class="comment-content">
                    <div class="comment-meta">
                        <span class="comment-author">${c.author}</span>
                        <span class="comment-time">${c.time}</span>
                        <div class="comment-actions-icons">
                            <span style="cursor:pointer;" title="Edit">&#9998;</span>
                            <span style="cursor:pointer;" title="Delete">&#128465;</span>
                        </div>
                    </div>
                    <div class="comment-text">${c.text}</div>
                    <div class="comment-links"><a href="#">Reply</a> | <a href="#">Attach file</a></div>
                </div>
            `;
            body.appendChild(div);
        });
    }

    function closeComments(event) {
        if (event.target === document.getElementById("commentsOverlay")) {
            closeCommentsPanel();
        }
    }

    function closeCommentsPanel() {
        document.getElementById("commentsOverlay").style.display = "none";
    }

    function postComment() {
        const input = document.getElementById("commentInput");
        const text = input.value.trim();
        if (!text) return;

        const body = document.getElementById("commentsBody");
        const div = document.createElement("div");
        div.className = "comment-item";
        div.style.marginTop = "16px";
        div.innerHTML = `
            <div class="comment-avatar" style="background:#0070d2;">You</div>
            <div class="comment-content">
                <div class="comment-meta">
                    <span class="comment-author">You</span>
                    <span class="comment-time">Just now</span>
                    <div class="comment-actions-icons">
                        <span style="cursor:pointer;" title="Edit">&#9998;</span>
                        <span style="cursor:pointer;" title="Delete">&#128465;</span>
                    </div>
                </div>
                <div class="comment-text">${text}</div>
                <div class="comment-links"><a href="#">Reply</a> | <a href="#">Attach file</a></div>
            </div>
        `;
        body.appendChild(div);
        input.value = "";
    }

    // Handle Enter key in comment input
    document.addEventListener("DOMContentLoaded", () => {
        document.getElementById("commentInput").addEventListener("keypress", (e) => {
            if (e.key === "Enter") postComment();
        });
    });

    // Initial render
    renderView("root");
</script>
</body>
</html>
